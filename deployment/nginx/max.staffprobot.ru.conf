# Поддомен MAX webhook → контейнер web :8001
# 1) DNS: A max.staffprobot.ru → IP сервера
# 2) certbot certonly --webroot -w /var/www/html -d max.staffprobot.ru
# 3) Подключить: ln -s .../max.staffprobot.ru.conf /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx
# Не трогает vhost'ы cvetbuket / цветутцветы.

server {
    listen 80;
    server_name max.staffprobot.ru;
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name max.staffprobot.ru;

    ssl_certificate /etc/letsencrypt/live/max.staffprobot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/max.staffprobot.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location = /max/webhook {
        proxy_pass http://127.0.0.1:8001/max/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        return 404;
    }
}
